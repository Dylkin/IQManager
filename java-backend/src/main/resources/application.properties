# Application
server.port=8080
spring.application.name=TenderBot

# Database
spring.datasource.url=jdbc:h2:file:/tmp/tenderbot/data;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.tenderbot=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=/tmp/tenderbot/logs/tenderbot.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Telegram Bot
telegram.bot.username=${TELEGRAM_BOT_USERNAME:}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.channel.id=${TELEGRAM_CHANNEL_ID:}

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.default-encoding=UTF-8

# Tender Parser Settings
parser.goszakupki.base-url=https://goszakupki.by
parser.goszakupki.timeout=30000
parser.supplier.timeout=30000
parser.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36

# Scheduling
scheduler.telegram-poll-interval=60000
scheduler.tender-process-interval=120000

# File Storage
document.storage.path=/tmp/tenderbot/documents

# OCR Configuration (for scanned/image-based PDFs)
ocr.python.path=python
ocr.script.path=scripts/ocr_pdf.py

# Supplier Sites
supplier.sites=redhon.ru,dia-m.ru

# Static Resources (SPA)
spring.web.resources.static-locations=classpath:/static/
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.must-revalidate=true

# JWT Configuration
jwt.secret=${JWT_SECRET:U2VjdXJlSldUU2VjcmV0S2V5Rm9ySFFNYW5hZ2VyQXBwbGljYXRpb24yMDI2}
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# BCrypt
bcrypt.strength=12

# Ollama (local LLM for parameter extraction)
ollama.base-url=http://localhost:11434
ollama.model=qwen2.5:3b
ollama.timeout=120000
